name: Build and Push Docker Images

# 触发条件：push 到 master 分支，或手动触发
on:
  push:
    branches: [master]
    paths:
      - 'BuyiDictionaryApp-main/**'
      - 'buyi-dictionary-vue/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./BuyiDictionaryApp-main/BuyiDictionaryApp-main/backend
          file: ./BuyiDictionaryApp-main/BuyiDictionaryApp-main/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/buyi-backend:latest
            ${{ env.IMAGE_PREFIX }}/buyi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./buyi-dictionary-vue
          file: ./buyi-dictionary-vue/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/buyi-web:latest
            ${{ env.IMAGE_PREFIX }}/buyi-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
