version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: buyi-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-buyi_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-buyi_dictionary}
      MYSQL_USER: ${MYSQL_USER:-buyi_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-buyi_password}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buyi-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost}
      ENABLE_SWAGGER: true
      JWT_SECRET: ${JWT_SECRET:-your-production-jwt-secret-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${MYSQL_USER:-buyi_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-buyi_password}
      DB_NAME: ${MYSQL_DATABASE:-buyi_dictionary}
      DB_SYNCHRONIZE: false
      DB_LOGGING: false
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_MOCK_MODE: ${WECHAT_MOCK_MODE:-true}
      MEDIA_DRIVER: local
      MEDIA_MAX_FILE_SIZE: 10485760
      MEDIA_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost}/uploads
      MEDIA_LOCAL_UPLOAD_DIR: /app/backend/uploads
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-Admin@123456}
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
    volumes:
      - backend-uploads:/app/backend/uploads
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mysql-data:
  backend-uploads:
