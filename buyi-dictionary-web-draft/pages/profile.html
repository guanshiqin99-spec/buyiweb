    <link rel="stylesheet" href="../liquid-glass.css">
    <style>
.profile-wrap { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
.avatar-card { display: flex; flex-direction: column; align-items: center; padding: 40px 32px; text-align: center; }
.avatar-ring { position: relative; width: 88px; height: 88px; margin-bottom: 20px; }
.avatar-ring .avatar { width: 100%; height: 100%; border-radius: 999px; background: linear-gradient(135deg, var(--c-brand-08), var(--c-accent-10)); display: flex; align-items: center; justify-content: center; font-size: 36px; }
.avatar-ring::after { content: ''; position: absolute; inset: -5px; border-radius: 999px; border: 2px dashed var(--c-brand-25); }
.avatar-card .name { font-size: 22px; font-weight: 600; color: var(--c-text); margin: 0 0 6px 0; }
.avatar-card .desc { font-size: 14px; color: var(--c-text-60); margin: 0 0 20px 0; }
.login-btn { padding: 12px 32px; background: var(--c-brand); color: var(--c-white); border: none; border-radius: 999px; font: 600 14px var(--font-sans); cursor: pointer; transition: background 200ms ease, transform 200ms ease; }
.login-btn:hover { background: var(--c-brand-dark); transform: translateY(-2px); }
.menu-list { padding: 8px 0; }
.menu-item { display: flex; align-items: center; padding: 16px 24px; text-decoration: none; color: inherit; cursor: pointer; transition: background 200ms ease; border-bottom: 1px solid var(--c-divider); }
.menu-item:last-child { border-bottom: none; }
.menu-item:hover { background: var(--c-brand-06); }
.menu-item .mi { font-size: 20px; margin-right: 16px; }
.menu-item .mt { flex: 1; font-size: 15px; font-weight: 500; color: var(--c-text); }
.menu-item .arrow { color: var(--c-text-35); transition: transform 200ms ease; }
.menu-item:hover .arrow { transform: translateX(4px); color: var(--c-brand); }
.app-info { text-align: center; padding: 24px; }
.app-info .logo { font-size: 32px; margin-bottom: 8px; }
.app-info .name { font-size: 16px; font-weight: 600; color: var(--c-text); margin: 0 0 4px 0; }
.app-info .ver { font-size: 12px; color: var(--c-text-50); margin: 0 0 8px 0; font-family: var(--font-mono); }
.app-info .copy { font-size: 12px; color: var(--c-text-35); margin: 0; }
    </style>
</head>
