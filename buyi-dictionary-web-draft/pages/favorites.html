    <style>
.fav-wrap { max-width: 720px; margin: 0 auto; }
.fav-tabs { display: inline-flex; gap: 8px; padding: 4px; border-radius: 999px; margin-bottom: 24px; }
.fav-tabs button { padding: 8px 18px; border: none; border-radius: 999px; background: transparent; color: var(--c-text-60); font: 500 13px var(--font-sans); cursor: pointer; transition: background 150ms ease, color 150ms ease; }
.fav-tabs button.active { background: var(--c-brand); color: var(--c-white); }
.fav-list { display: flex; flex-direction: column; gap: 12px; }
.fav-item { display: flex; align-items: center; gap: 16px; padding: 18px 22px; }
.fav-item .type-dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }
.fav-item .type-dot.word { background: var(--c-brand); }
.fav-item .type-dot.phrase { background: var(--c-accent); }
.fav-item .type-dot.proverb { background: var(--c-brand-light); }
.fav-item .body { flex: 1; min-width: 0; }
.fav-item .bouyei { font-size: 17px; font-weight: 600; color: var(--c-text); margin: 0 0 2px 0; }
.fav-item .meaning { font-size: 13px; color: var(--c-text-60); margin: 0; }
.fav-item .remove { width: 32px; height: 32px; border: none; border-radius: 999px; background: transparent; color: var(--c-text-35); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 150ms ease, color 150ms ease; }
.fav-item .remove:hover { background: var(--c-danger); color: #fff; }
    </style>

    <script>
      // tab 切换占位
      document.querySelectorAll('.fav-tabs button').forEach(function(btn){
        btn.addEventListener('click', function(){
          document.querySelectorAll('.fav-tabs button').forEach(function(b){ b.classList.remove('active'); b.setAttribute('aria-pressed','false'); });
          btn.classList.add('active');
          btn.setAttribute('aria-pressed','true');
          console.log('[fav-tab]', btn.textContent.trim());
        });
      });
      // 取消收藏占位
      document.querySelectorAll('.fav-item .remove').forEach(function(b){
        b.addEventListener('click', function(){ console.log('[fav-remove]', this.closest('.fav-item')?.querySelector('.bouyei')?.textContent || ''); });
      });
    </script>
