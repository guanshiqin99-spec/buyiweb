<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鼠标光影跟随效果示例</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    h1 {
      color: #e8e8e8;
      font-size: 32px;
      font-weight: 300;
      text-align: center;
      margin-bottom: 20px;
    }

    .demo-section {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 40px;
    }

    /* 容器样式 */
    .glow-icon {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    /* 光影层 */
    .glow-icon::before {
      content: '';
      position: absolute;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
      left: var(--glow-x, 50%);
      top: var(--glow-y, 50%);
    }

    /* 鼠标悬停时显示光影 */
    .glow-icon:hover::before {
      opacity: 1;
    }

    /* 鼠标悬停时的边框效果 */
    .glow-icon:hover {
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    /* 图标内容 */
    .glow-icon svg {
      width: 36px;
      height: 36px;
      fill: rgba(255, 255, 255, 0.9);
      z-index: 1;
      transition: transform 0.3s ease;
    }

    .glow-icon:hover svg {
      transform: scale(1.1);
    }

    /* 不同颜色的变体 */
    .glow-icon.blue::before {
      background: radial-gradient(circle, rgba(66, 153, 225, 0.5) 0%, transparent 70%);
    }

    .glow-icon.orange::before {
      background: radial-gradient(circle, rgba(237, 137, 54, 0.5) 0%, transparent 70%);
    }

    .glow-icon.purple::before {
      background: radial-gradient(circle, rgba(159, 122, 234, 0.5) 0%, transparent 70%);
    }

    .glow-icon.green::before {
      background: radial-gradient(circle, rgba(72, 187, 120, 0.5) 0%, transparent 70%);
    }

    /* 大尺寸变体 */
    .glow-icon.large {
      width: 120px;
      height: 120px;
      border-radius: 30px;
    }

    .glow-icon.large svg {
      width: 50px;
      height: 50px;
    }

    .glow-icon.large::before {
      width: 200px;
      height: 200px;
    }

    /* 小尺寸变体 */
    .glow-icon.small {
      width: 50px;
      height: 50px;
      border-radius: 12px;
    }

    .glow-icon.small svg {
      width: 24px;
      height: 24px;
    }

    .glow-icon.small::before {
      width: 100px;
      height: 100px;
    }

    /* 代码说明区域 */
    .code-explanation {
      max-width: 800px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #cbd5e0;
      line-height: 1.8;
    }

    .code-explanation h2 {
      color: #e8e8e8;
      margin-bottom: 20px;
      font-weight: 400;
    }

    .code-explanation code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'Consolas', monospace;
    }

    /* 减少动效模式 */
    @media (prefers-reduced-motion: reduce) {
      .glow-icon,
      .glow-icon::before,
      .glow-icon svg {
        transition: none;
      }
      
      .glow-icon:hover {
        transform: none;
      }
      
      .glow-icon:hover svg {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <h1>鼠标光影跟随效果示例</h1>

  <div class="demo-section">
    <!-- 基础图标 -->
    <div class="glow-icon" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>

    <!-- 蓝色变体 -->
    <div class="glow-icon blue" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
    </div>

    <!-- 橙色变体 -->
    <div class="glow-icon orange" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
      </svg>
    </div>

    <!-- 紫色变体 -->
    <div class="glow-icon purple" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
      </svg>
    </div>

    <!-- 绿色变体 -->
    <div class="glow-icon green" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
  </div>

  <!-- 大尺寸示例 -->
  <div class="demo-section">
    <div class="glow-icon large blue" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
    </div>
    <div class="glow-icon large orange" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
      </svg>
    </div>
    <div class="glow-icon large purple" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
      </svg>
    </div>
  </div>

  <!-- 小尺寸示例 -->
  <div class="demo-section">
    <div class="glow-icon small" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
    </div>
    <div class="glow-icon small green" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M10.325 4.317c.426-1.056 1.826-1.056 2.252 0a.932.932 0 001.308.445c1.027-.545 2.176.582 1.643 1.617a.932.932 0 00.438 1.308c1.056.426 1.056 1.826 0 2.252a.932.932 0 00-.445 1.308c.545 1.027-.582 2.176-1.617 1.643a.932.932 0 00-1.308.438c-.426 1.056-1.826 1.056-2.252 0a.932.932 0 00-1.308-.445c-1.027.545-2.176-.582-1.643-1.617a.932.932 0 00-.438-1.308c-1.056-.426-1.056-1.826 0-2.252a.932.932 0 00.445-1.308c-.545-1.027.582-2.176 1.617-1.643a.932.932 0 001.308-.438zM15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </div>
    <div class="glow-icon small blue" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
    </div>
    <div class="glow-icon small orange" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
    </div>
    <div class="glow-icon small purple" data-glow>
      <svg viewBox="0 0 24 24">
        <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
    </div>
  </div>

  <!-- 代码说明 -->
  <div class="code-explanation">
    <h2>实现原理</h2>
    <p>
      1. <code>::before</code> 伪元素作为光影层，使用 <code>radial-gradient</code> 创建径向渐变光斑
    </p>
    <p>
      2. 通过 JavaScript 监听 <code>mousemove</code> 事件，计算鼠标相对于元素的位置
    </p>
    <p>
      3. 使用 CSS 变量 <code>--glow-x</code> 和 <code>--glow-y</code> 实时更新光影位置
    </p>
    <p>
      4. <code>overflow: hidden</code> 确保光影不会溢出容器边界
    </p>
    <p>
      5. 添加 <code>@media (prefers-reduced-motion)</code> 支持无障碍访问
    </p>
  </div>

  <script>
    // 获取所有需要光影效果的元素
    const glowElements = document.querySelectorAll('[data-glow]');

    glowElements.forEach(element => {
      // 鼠标移动时更新光影位置
      element.addEventListener('mousemove', (e) => {
        const rect = element.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        // 更新 CSS 变量
        element.style.setProperty('--glow-x', `${x}px`);
        element.style.setProperty('--glow-y', `${y}px`);
      });

      // 鼠标离开时重置光影位置到中心
      element.addEventListener('mouseleave', () => {
        element.style.setProperty('--glow-x', '50%');
        element.style.setProperty('--glow-y', '50%');
      });
    });
  </script>
</body>
</html>
