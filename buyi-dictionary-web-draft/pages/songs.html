    <style>
.songs-wrap { max-width: 980px; margin: 0 auto; display: flex; flex-direction: column; gap: 48px; }
.section-title { font-size: 24px; font-weight: 600; color: var(--c-text); margin: 0 0 24px 0; }
.song-list { display: flex; flex-direction: column; gap: 14px; }
.song-card { display: flex; align-items: center; padding: 18px 22px; gap: 16px; }
.song-card.playing { border-color: var(--c-brand-25); box-shadow: 0 0 0 1px var(--c-brand-25), 0 8px 24px var(--c-shadow-soft); animation: breathe 3s ease-in-out infinite; }
@keyframes breathe { 0%,100% { box-shadow: 0 0 0 1px var(--c-brand-25), 0 8px 24px var(--c-shadow-soft); } 50% { box-shadow: 0 0 0 2px var(--c-brand-40), 0 12px 32px var(--c-shadow-12); } }
@media (prefers-reduced-motion: reduce) { .song-card.playing { animation: none; } }
.song-cover { width: 56px; height: 56px; border-radius: 12px; background: linear-gradient(135deg, var(--c-brand), var(--c-brand-light)); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; }
.song-info { flex: 1; min-width: 0; }
.song-info h3 { font-size: 16px; font-weight: 600; color: var(--c-text); margin: 0 0 4px 0; }
.song-info .artist { font-size: 13px; color: var(--c-text-60); margin: 0 0 6px 0; }
.song-info .genre { display: inline-block; padding: 2px 10px; border-radius: 999px; background: var(--c-brand-08); color: var(--c-brand); font-size: 11px; font-weight: 500; }
.song-meta { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.song-meta .dur { font-size: 13px; color: var(--c-text-50); font-family: var(--font-mono); }
.play-btn { width: 44px; height: 44px; border: none; border-radius: 999px; background: var(--c-brand); color: var(--c-white); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 200ms ease, background 200ms ease; text-decoration: none; }
.play-btn:hover { transform: scale(1.08); background: var(--c-brand-dark); }
.play-btn.active { background: var(--c-accent); }
.culture-card { padding: 36px; text-align: center; border: 1px solid var(--c-white-50); position: relative; }
.culture-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: repeating-linear-gradient(90deg, var(--c-brand) 0, var(--c-brand) 8px, var(--c-accent) 8px, var(--c-accent) 16px); }
.culture-card h2 { font-size: 22px; font-weight: 600; color: var(--c-text); margin: 0 0 14px 0; }
.culture-card p { font-size: 15px; color: var(--c-text-70); line-height: 1.7; margin: 0 0 20px 0; max-width: 480px; margin-left: auto; margin-right: auto; }
.culture-tags { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.culture-tags span { padding: 6px 16px; border-radius: 999px; background: var(--c-brand-08); color: var(--c-brand); font-size: 13px; font-weight: 500; }
@media (max-width: 640px) { .song-card { padding: 14px; } .song-cover { width: 48px; height: 48px; } }
