<!DOCTYPE html>

<html lang="zh-CN" class="light">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#F5F2EF">

    <title>播放器 - 布依族词典</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../liquid-glass.css">

</head>

<body style="font-family: 'DM Sans', ui-sans-serif, sans-serif; margin: 0;">

    <a class="skip-link" href="#main">跳到主内容</a>

    <!-- 背景: 模糊放大图 + 深色蒙层 (沉浸式播放器) -->

    <div style="position: fixed; inset: 0; z-index: -2;

                background: url('../assets/music-ambient.jpg') center/cover no-repeat;

                filter: blur(40px) scale(1.2);

                transform: scale(1.2);

                transform-origin: center;"></div>

    <div style="position: fixed; inset: 0; z-index: -1;

                background: linear-gradient(135deg, var(--c-overlay-deep-1), var(--c-overlay-deep-2));"></div>

    <div class="particles" data-pattern="drum" data-count="10" aria-hidden="true"></div>
    <div class="nav-scrim" aria-hidden="true"></div>

    <!-- 沉浸式导航栏 -->
    <nav class="nav-immersive" id="mainNav">
        <div class="nav-inner">
            <a href="home.html" class="nav-brand"><svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>布依族词典</span></a>
            <div class="nav-rail">
                <a href="home.html" class="nav-link">首页</a>
                <a href="vocabulary.html" class="nav-link">词典</a>
                <a href="phrases.html" class="nav-link">学习</a>
                <a href="songs.html" class="nav-link active">民歌</a>
                <a href="culture.html" class="nav-link">文化</a>
                <a href="favorites.html" class="nav-link">收藏</a>
                <a href="profile.html" class="nav-link">我的</a>
            </div>
            <button class="nav-burger" aria-label="打开菜单" aria-expanded="false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        </div>
        <div class="nav-drawer" id="navDrawer">
            <a href="home.html">首页</a>
            <a href="vocabulary.html">词典</a>
            <a href="phrases.html">学习</a>
            <a href="songs.html" class="active">民歌</a>
            <a href="culture.html">文化</a>
            <a href="favorites.html">收藏</a>
            <a href="profile.html">我的</a>
        </div>
    </nav>

    <!-- 返回按钮 (左上角 absolute, 白色, → songs.html) -->

    <a href="songs.html" data-dom-id="back-btn" aria-label="返回民歌页" style="position: absolute; top: 24px; left: 24px; z-index: 50; display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; color: var(--c-white); text-decoration: none; transition: color 150ms ease;">

        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--c-white)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

    </a>



    <!-- 内容区 (居中 flex column, min-height 100vh, padding 32px) -->

    <main id="main" style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 64px 32px 120px; box-sizing: border-box; position: relative; z-index: 3;">
        <div class="page-hero-dark stagger-enter" style="display: flex; flex-direction: column; align-items: center; gap: 32px;">

        <!-- 唱片封面 -->

        <div class="reveal reveal-1" style="width: 240px; height: 240px; border-radius: 999px; border: 12px solid var(--c-bg-silver); overflow: hidden; box-shadow: 0 24px 64px var(--c-shadow-40); flex-shrink: 0;">

            <img src="../assets/bouyei-craft.jpg" alt="布依迎客歌 封面" width="600" height="600" style="width: 100%; height: 100%; object-fit: cover; display: block;">

        </div>



        <!-- 歌曲信息 -->

        <div class="reveal reveal-2" style="display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;">

            <h1 style="font-size: 24px; font-weight: 700; color: var(--c-white); margin: 0; letter-spacing: -0.01em;">布依迎客歌</h1>

            <p style="font-size: 14px; font-weight: 400; color: var(--c-white-60); margin: 0;">布依青年合唱团</p>

            <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">

                <span style="display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; background: var(--c-brand); color: var(--c-white); font-size: 12px; font-weight: 500; line-height: 1;">迎客调</span>

                <span style="display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; background: var(--c-accent); color: var(--c-white); font-size: 12px; font-weight: 500; line-height: 1;">传统民歌</span>

                <span style="display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; background: var(--c-white-15); color: var(--c-white); font-size: 12px; font-weight: 500; line-height: 1;">合唱</span>

            </div>

        </div>



        <!-- 播放控制 -->

        <div class="reveal reveal-3" style="display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; max-width: 480px;">



            <!-- 控制按钮行 -->

            <div style="display: flex; align-items: center; justify-content: center; gap: 32px;">

                <button aria-label="上一首" style="border: none; background: transparent; color: var(--c-white-60); cursor: pointer; padding: 8px; transition: color 150ms ease; display: inline-flex; align-items: center; justify-content: center;">

                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>

                </button>

                <button aria-label="播放" style="display: flex; align-items: center; justify-content: center; width: 48px; height: 48px; border: none; border-radius: 999px; background: var(--c-brand); color: var(--c-white); cursor: pointer; transition: filter 150ms ease;">

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 4 20 12 6 20 6 4"/></svg>

                </button>

                <button aria-label="下一首" style="border: none; background: transparent; color: var(--c-white-60); cursor: pointer; padding: 8px; transition: color 150ms ease; display: inline-flex; align-items: center; justify-content: center;">

                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>

                </button>

            </div>



            <!-- 进度条 + 时间行 -->

            <div style="display: flex; flex-direction: column; gap: 8px; width: 100%;">

                <div role="slider" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100" aria-label="播放进度" tabindex="0" style="height: 4px; border-radius: 999px; background: var(--c-white-15); overflow: hidden;">

                    <div style="width: 45%; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--c-brand), var(--c-brand-light));"></div>

                </div>

                <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">

                    <span style="font-size: 11px; color: var(--c-white-60); font-variant-numeric: tabular-nums;">01:42</span>

                    <span style="font-size: 11px; color: var(--c-white-60); font-variant-numeric: tabular-nums;">03:42</span>

                </div>

            </div>

        </div>



        <!-- 底部操作栏 -->

        <div class="reveal reveal-4" style="display: flex; align-items: center; justify-content: center; gap: 32px; margin-top: 8px;">

            <button aria-label="收藏" style="border: none; background: transparent; color: var(--c-white-60); cursor: pointer; padding: 8px; transition: color 150ms ease; display: inline-flex; align-items: center; justify-content: center;">

                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>

            </button>

            <button aria-label="分享" style="border: none; background: transparent; color: var(--c-white-60); cursor: pointer; padding: 8px; transition: color 150ms ease; display: inline-flex; align-items: center; justify-content: center;">

                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>

            </button>

            <button aria-label="歌词" style="border: none; background: transparent; color: var(--c-white-60); cursor: pointer; padding: 8px; transition: color 150ms ease; display: inline-flex; align-items: center; justify-content: center;">

                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

            </button>

        </div>

        </div>
    </main>

    <!-- 底部播放器（由 app.js 注入） -->
    <div data-player-bar></div>

    <script src="../app.js"></script>
    <script>
      // 占位事件绑定
      document.querySelectorAll('main button[aria-label]').forEach(function(btn){
        var label = btn.getAttribute('aria-label');
        btn.addEventListener('click', function(){ console.log('[player]', label); });
      });
      // 进度条键盘处理
      var slider = document.querySelector('[role="slider"]');
      if (slider) {
        slider.addEventListener('keydown', function(e){
          var v = parseInt(slider.getAttribute('aria-valuenow'),10);
          if(e.key==='ArrowLeft'||e.key==='ArrowDown'){ v=Math.max(0,v-5); e.preventDefault(); }
          else if(e.key==='ArrowRight'||e.key==='ArrowUp'){ v=Math.min(100,v+5); e.preventDefault(); }
          else return;
          slider.setAttribute('aria-valuenow', v);
          slider.querySelector('div').style.width = v+'%';
          console.log('[progress]', v);
        });
      }
    </script>
</body>

</html>
