<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F5F2EF">
    <title>学习足迹 - 布依族词典</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../liquid-glass.css">
    <style>
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; max-width: 720px; margin: 0 auto; }
.stat-card { padding: 24px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.stat-card .num { font-size: 36px; font-weight: 700; color: var(--c-text); margin: 0; letter-spacing: -0.02em; }
.stat-card .num .unit { font-size: 18px; color: var(--c-brand); }
.stat-card .label { font-size: 13px; color: var(--c-text-60); margin: 4px 0 0 0; }
.recent-scroll { display: flex; gap: 16px; overflow-x: auto; padding: 4px 4px 16px; max-width: 980px; margin: 0 auto; }
.recent-card { flex: 0 0 200px; padding: 20px; }
.recent-card h4 { font-size: 18px; font-weight: 700; color: var(--c-text); margin: 0 0 4px 0; }
.recent-card .phonetic { font-size: 12px; color: var(--c-brand-light); font-family: var(--font-mono); margin: 0 0 8px 0; }
.recent-card .meaning { font-size: 14px; color: var(--c-text-70); margin: 0; }
    </style>
</head>
<body style="font-family: 'DM Sans', ui-sans-serif, sans-serif; margin: 0;">
    <a class="skip-link" href="#main">跳到主内容</a>
    <div class="page-bg"><img src="../assets/bg-record.jpg" alt="" loading="lazy"/></div>
    <div class="page-overlay cool"></div>
    <div class="particles" data-pattern="drum" data-count="10" aria-hidden="true"></div>
    <div class="nav-scrim" aria-hidden="true"></div>
    <nav class="nav-immersive" id="mainNav">
        <div class="nav-inner">
            <a href="home.html" class="nav-brand"><svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>布依族词典</span></a>
            <div class="nav-rail">
                <a href="home.html" class="nav-link">首页</a>
                <a href="vocabulary.html" class="nav-link">词典</a>
                <a href="phrases.html" class="nav-link">学习</a>
                <a href="songs.html" class="nav-link">民歌</a>
                <a href="culture.html" class="nav-link">文化</a>
                <a href="favorites.html" class="nav-link">收藏</a>
                <a href="profile.html" class="nav-link active">我的</a>
            </div>
            <button class="nav-burger" aria-label="打开菜单" aria-expanded="false"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        </div>
        <div class="nav-drawer" id="navDrawer">
            <a href="home.html">首页</a>
            <a href="vocabulary.html">词典</a>
            <a href="phrases.html">学习</a>
            <a href="songs.html">民歌</a>
            <a href="culture.html">文化</a>
            <a href="favorites.html">收藏</a>
            <a href="profile.html">我的</a>
        </div>
    </nav>
    <main id="main" style="padding-top: 64px; padding-bottom: 120px; position: relative; z-index: 3;">
        <section class="page-hero-dark"><div class="reveal reveal-1" style="padding: 32px 24px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2;">
            <p style="font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--c-accent); margin: 0 0 12px 0;">学习记录</p>
            <h1 class="title-breathe" style="font-size: clamp(32px, 5vw, 48px); font-weight: 600; letter-spacing: -0.03em; line-height: 1; color: #fff; margin: 0; text-align: center;">学习足迹</h1>
            <p style="font-size: 15px; color: rgba(255,255,255,0.78); max-width: 480px; margin: 12px 0 0 0; text-align: center; line-height: 1.55;">记录每日布依语学习进度</p>
        </div></section>
        <section class="reveal reveal-2" style="padding: 0 24px 32px;">
            <div class="stat-grid">
                <div class="liquid-glass glow-card stat-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <p class="num">30</p>
                    <p class="label">学习天数</p>
                </div>
                <div class="liquid-glass glow-card stat-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <p class="num">128</p>
                    <p class="label">已学词汇</p>
                </div>
                <div class="liquid-glass glow-card stat-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <p class="num">12</p>
                    <p class="label">连续打卡</p>
                </div>
                <div class="liquid-glass glow-card stat-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <p class="num">85<span class="unit">%</span></p>
                    <p class="label">正确率</p>
                </div>
            </div>
        </section>
        <section class="reveal reveal-3" style="padding: 0 24px 32px;">
            <h2 style="font-size: 18px; font-weight: 600; color: var(--c-text); max-width: 980px; margin: 0 auto 16px;">最近学习</h2>
            <div class="recent-scroll no-scrollbar" tabindex="0" aria-label="最近学习卡片列表，可使用左右方向键滚动" onkeydown="var el=this; if(event.key==='ArrowLeft'){el.scrollBy({left:-220,behavior:'smooth'});event.preventDefault();} else if(event.key==='ArrowRight'){el.scrollBy({left:220,behavior:'smooth'});event.preventDefault();}">
                <div class="liquid-glass glow-card recent-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <h4>ndaangl</h4>
                    <p class="phonetic">/naːŋl/</p>
                    <p class="meaning">词条 · 2 小时前</p>
                </div>
                <div class="liquid-glass glow-card recent-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <h4>gaaus xaux</h4>
                    <p class="meaning">短语 · 5 小时前</p>
                </div>
                <div class="liquid-glass glow-card recent-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <h4>naz</h4>
                    <p class="phonetic">/na²/</p>
                    <p class="meaning">词条 · 昨天</p>
                </div>
                <div class="liquid-glass glow-card recent-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <h4>布依迎客歌</h4>
                    <p class="meaning">歌曲 · 2 天前</p>
                </div>
                <div class="liquid-glass glow-card recent-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <h4>gox mbaanx</h4>
                    <p class="phonetic">/ko mbaːn/</p>
                    <p class="meaning">短语 · 3 天前</p>
                </div>
                <div class="liquid-glass glow-card recent-card card-interactive stagger-enter">
                    <div class="glow-effect"></div>
                    <h4>mal</h4>
                    <p class="phonetic">/maːl/</p>
                    <p class="meaning">词条 · 1 周前</p>
                </div>
            </div>
        </section>
    </main>
    <div data-player-bar"></div>
    <script src="../app.js"></script>
    <script>
      document.querySelectorAll('.recent-card').forEach(function(c){
        c.addEventListener('click', function(){ console.log('[recent]', c.querySelector('h4')?.textContent || ''); });
      });
    </script>
</body>
</html>
