<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F5F2EF">
    <script>
      // 在 JS 模块加载前同步主题色，避免地址栏闪烁
      (function () {
        try {
          const mode = localStorage.getItem('buyi_theme') || 'light'
          const resolved = mode === 'auto'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : mode
          const meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0f1419' : '#F5F2EF')
        } catch (e) { /* 静默忽略 */ }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap">
    <title>布依族词典</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
